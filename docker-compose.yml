version: '3.9'

services:
  mongodb:
    image: mongo:6.0
    container_name: notes_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: saurav
      MONGO_INITDB_ROOT_PASSWORD: saurav8587
      MONGO_INITDB_DATABASE: notes_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - notes_network

  backend:
    build: ./backend
    container_name: notes_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://admin:password@mongodb:27017/notes_db?authSource=admin
      DATABASE_NAME: notes_db
      SECRET_KEY: change-this-in-production-please
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost"]'
    depends_on:
      - mongodb
    networks:
      - notes_network

  frontend:
    build: ./frontend
    container_name: notes_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - notes_network

volumes:
  mongo_data:

networks:
  notes_network:
    driver: bridge
